name: QMK Firmware Build Action

on:
  push:
    branches:
      - corne_procyon_dev
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout custom keyboard code
        uses: actions/checkout@v4

      - name: Checkout QMK firmware
        uses: actions/checkout@v4
        with:
          repository: qmk/qmk_firmware
          path: qmk_firmware
          submodules: recursive

      - name: Compile firmware
        run: |
          # Copy our keyboard files into the QMK tree
          cp -r keyboards/corne_procyon36 qmk_firmware/keyboards/
          cd qmk_firmware
          
          # Build using the official QMK CLI container mapped to our workspace
          docker run --rm -v ${{ github.workspace }}/qmk_firmware:/qmk_firmware -w /qmk_firmware ghcr.io/qmk/qmk_cli qmk compile -kb corne_procyon36 -km default
          
          # Change ownership of the build output from root so actions/upload-artifact can read it
          sudo chown -R $USER:$USER .build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: qmk_firmware/.build/*.hex
